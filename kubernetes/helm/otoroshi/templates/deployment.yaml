{{- if not .Values.cluster.enabled }}
{{- $secretName := default (printf "%s-admin-secret" .Values.name) .Values.env.existingSecret -}}
{{- $redisURL := default (printf "redis://%s-redis-master:6379" .Release.Name) .Values.env.redisURL -}}
{{- $lbType := include "otoroshi.loadBalancerType" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otoroshi.labels" . | nindent 4 }}
  {{- with .Values.deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "otoroshi.selectorLabels" . | nindent 6 }}
  replicas: {{ .Values.replicaCount | default .Values.replicas }}
  strategy:
  {{- with .Values.strategy }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "otoroshi.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      hostNetwork: false
      {{- include "otoroshi.podSchedulingFields" . | nindent 6 }}
      containers:
      - image: {{ .Values.image.name }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        name: {{ .Values.name }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.extraArgs }}
        args:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
          - containerPort: {{ .Values.image.http }}
            name: "http"
            protocol: TCP
          - containerPort: {{ .Values.image.https }}
            name: "https"
            protocol: TCP
        env:
          - name: APP_STORAGE_ROOT
            value: {{ .Values.env.storageRoot }}
          - name: OTOROSHI_INITIAL_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ $secretName }}
                key: password
          - name: APP_DOMAIN
            value: {{ .Values.env.domain }}
          - name: APP_STORAGE
            value: {{ .Values.storage.backend | quote }}
          - name: REDIS_URL
            value: {{ $redisURL | quote }}
          {{- $redisPwEnv := include "otoroshi.redisPasswordEnv" . }}
          {{- if $redisPwEnv }}
          {{- $redisPwEnv | nindent 10 }}
          {{- end }}
          - name: ADMIN_API_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: {{ $secretName }}
                key: clientId
          - name: ADMIN_API_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ $secretName }}
                key: clientSecret
          - name: ADMIN_API_ADDITIONAL_EXPOSED_DOMAIN
            value: otoroshi-api-service.{{ .Release.Namespace }}.svc.cluster.local
          - name: OTOROSHI_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ $secretName }}
                key: otoroshiSecret
          - name: HEALTH_LIMIT
            value: "5000"
          - name: SSL_OUTSIDE_CLIENT_AUTH
            value: Want
          - name: HTTPS_WANT_CLIENT_AUTH
            value: "true"
          - name: OTOROSHI_EXPOSED_PORTS_HTTP
            value: "{{ .Values.loadbalancer.nodePort.http }}"
          - name: OTOROSHI_EXPOSED_PORTS_HTTPS
            value: "{{ .Values.loadbalancer.nodePort.https }}"
          - name: OTOROSHI_INITIAL_CUSTOMIZATION
            value: >
              {
                "config":{
                  "tlsSettings": {
                    "defaultDomain": "www.{{ .Values.env.domain }}",
                    "randomIfNotFound": false
                  },
                  "scripts":{
                    "enabled":true,
                    "sinkRefs":[
                      "cp:otoroshi.plugins.jobs.kubernetes.KubernetesAdmissionWebhookCRDValidator",
                      "cp:otoroshi.plugins.jobs.kubernetes.KubernetesAdmissionWebhookSidecarInjector"
                    ],
                    "sinkConfig": {},
                    "jobRefs":[
                      "cp:otoroshi.plugins.jobs.kubernetes.KubernetesOtoroshiCRDsControllerJob"{{ if .Values.gatewayApi.enabled }},
                      "cp:otoroshi.plugins.jobs.kubernetes.KubernetesGatewayApiControllerJob"{{ end }}
                    ],
                    "jobConfig":{
                      "KubernetesConfig": {
                        "trust": false,
                        "namespaces": [
                          "*"
                        ],
                        "labels": {},
                        "namespacesLabels": {},
                        "ingressClasses": [
                          "otoroshi"
                        ],
                        "defaultGroup": "default",
                        "ingresses": false,
                        "crds": true,
                        "coreDnsIntegration": false,
                        "coreDnsIntegrationDryRun": false,
                        "kubeLeader": false,
                        "restartDependantDeployments": false,
                        "watch": false,
                        "syncDaikokuApikeysOnly": false,
                        "kubeSystemNamespace": "kube-system",
                        "coreDnsConfigMapName": "coredns",
                        "coreDnsDeploymentName": "coredns",
                        "corednsPort": 53,
                        "otoroshiServiceName": "{{ .Values.service.name }}",
                        "otoroshiNamespace": "{{ .Release.Namespace }}",
                        "clusterDomain": "cluster.local",
                        "syncIntervalSeconds": 60,
                        "coreDnsEnv": null,
                        "watchTimeoutSeconds": 60,
                        "watchGracePeriodSeconds": 5,
                        "mutatingWebhookName": "otoroshi-admission-webhook-injector",
                        "validatingWebhookName": "otoroshi-admission-webhook-validation",{{ if .Values.gatewayApi.enabled }}
                        "gatewayApi": true,
                        "gatewayApiControllerName": "{{ .Values.gatewayApi.controllerName }}",
                        "gatewayApiHttpListenerPort": {{ .Values.gatewayApi.httpListenerPort }},
                        "gatewayApiHttpsListenerPort": {{ .Values.gatewayApi.httpsListenerPort }},
                        "gatewayApiSyncIntervalSeconds": {{ .Values.gatewayApi.syncIntervalSeconds }},{{ end }}
                        "templates": {
                          "service-group": {},
                          "service-descriptor": {},
                          "apikeys": {},
                          "global-config": {},
                          "jwt-verifier": {},
                          "tcp-service": {},
                          "certificate": {},
                          "auth-module": {},
                          "script": {},
                          "organizations": {},
                          "teams": {},
                          "webhooks": {
                            "flags": {
                              "requestCert": true,
                              "originCheck": true,
                              "tokensCheck": true,
                              "displayEnv": false,
                              "tlsTrace": false
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
          - name: JAVA_OPTS
            value: {{ .Values.javaOpts | quote }}
          {{- with .Values.extraEnv }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- with .Values.extraEnvFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.extraVolumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        readinessProbe:
          httpGet:
            path: /ready
            port: {{ .Values.image.http }}
          {{- with .Values.probes.readiness }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        livenessProbe:
          httpGet:
            path: /live
            port: {{ .Values.image.http }}
          {{- with .Values.probes.liveness }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        resources:
          {{- with .Values.resources }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otoroshi.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "otoroshi.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.service.http }}
    name: "http"
    targetPort: "http"
  - port: {{ .Values.service.https }}
    name: "https"
    targetPort: "https"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.apiName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otoroshi.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "otoroshi.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.service.http }}
    name: "http"
    targetPort: "http"
  - port: {{ .Values.service.https }}
    name: "https"
    targetPort: "https"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.loadbalancer.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otoroshi.labels" . | nindent 4 }}
  {{- with .Values.loadbalancer.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $lbType }}
  {{- if eq $lbType "LoadBalancer" }}
  {{- if .Values.loadbalancer.loadBalancerClass }}
  loadBalancerClass: {{ .Values.loadbalancer.loadBalancerClass | quote }}
  {{- end }}
  {{- with .Values.loadbalancer.sourceRanges }}
  loadBalancerSourceRanges:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  selector:
    {{- include "otoroshi.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.loadbalancer.http }}
    name: "http"
    targetPort: "http"
    {{- if eq $lbType "NodePort" }}
    nodePort: {{ .Values.loadbalancer.nodePort.http }}
    {{- end }}
  - port: {{ .Values.loadbalancer.https }}
    name: "https"
    targetPort: "https"
    {{- if eq $lbType "NodePort" }}
    nodePort: {{ .Values.loadbalancer.nodePort.https }}
    {{- end }}
{{- end }}

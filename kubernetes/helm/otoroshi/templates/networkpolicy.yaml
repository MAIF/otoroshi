{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "otoroshi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "otoroshi.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Otoroshi proxy + admin/API ports — open to everyone by default; tighten via extraIngress.
    - ports:
        - port: {{ .Values.image.http }}
          protocol: TCP
        - port: {{ .Values.image.https }}
          protocol: TCP
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # DNS resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Anything else (Redis, k8s API, upstream services, …). Tighten via extraEgress if needed.
    - {}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}

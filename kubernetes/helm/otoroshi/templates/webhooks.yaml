{{- $webhookServiceName := ternary .Values.cluster.leaderApiServiceName .Values.service.name .Values.cluster.enabled -}}
{{- if .Values.webhooks.validation }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: otoroshi-admission-webhook-validation
  labels:
    {{- include "otoroshi.labels" . | nindent 4 }}
    app.kubernetes.io/component: otoroshi-validation-webhook
webhooks:
  - name: otoroshi-admission-webhook.otoroshi.io
    rules:
      - operations: 
          - "CREATE"
          - "UPDATE"
        apiGroups: 
          - "proxy.otoroshi.io"
        apiVersions: 
          - "*"
        resources: 
          - "*"
        scope: "Namespaced"
    clientConfig:
      # url: "https://otoroshi-kubernetes-admission-webhook.otoroshi.svc.cluster.local:8443/apis/webhooks/validation"
      service:
        name: {{ $webhookServiceName }}
        namespace: {{ .Release.Namespace }}
        path: "/apis/webhooks/validation"
        port: {{ .Values.service.https }}
      caBundle: "" # injected at runtime
    failurePolicy: Ignore
    sideEffects: None
    admissionReviewVersions: 
      - "v1"
{{- end }}
{{- if .Values.webhooks.sidecarInject }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: otoroshi-admission-webhook-injector
  labels:
    {{- include "otoroshi.labels" . | nindent 4 }}
    app.kubernetes.io/component: otoroshi-sidecar-injector-webhook
webhooks:
  - name: otoroshi-admission-webhook-injector.otoroshi.io
    rules:
      - operations: 
          - "CREATE"
        apiGroups: 
          - ""
        apiVersions: 
          - "v1"
        resources: 
          - "pods"
        scope: "Namespaced"
    # namespaceSelector:
    #   matchLabels:
    #     otoroshi.io/sidecar: inject
    objectSelector:
      matchLabels:
        otoroshi.io/sidecar: inject
    clientConfig:
      # url: "https://otoroshi-kubernetes-admission-webhook.otoroshi.svc.cluster.local:8443/apis/webhooks/inject"
      service:
        name: {{ $webhookServiceName }}
        namespace: {{ .Release.Namespace }}
        path: "/apis/webhooks/inject"
        port: {{ .Values.service.https }}
      caBundle: "" # injected at runtime
    failurePolicy: Ignore
    sideEffects: None
    admissionReviewVersions: 
      - "v1"
{{- end }}

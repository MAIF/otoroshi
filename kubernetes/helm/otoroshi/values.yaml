
name: otoroshi

# Number of Otoroshi replicas. `replicas` is kept for backward compatibility.
replicaCount: 2
terminationGracePeriodSeconds: 60

global:
  # DEPRECATED. Only kept so existing values files keep installing.
  # New users should set storage.backend and redis.deploy explicitly.
  # When prod=false (legacy), defaults below switch to inmemory + 1 replica + no Redis subchart
  # — unless storage.backend / redis.deploy / replicaCount are set explicitly.
  prod: true

# Otoroshi storage backend.
# Allowed values: inmemory, lettuce, experimental-pg, postgres, cassandra, file, s3, http
# When using lettuce, also set env.redisURL (or leave it empty to use the bundled Redis subchart).
storage:
  backend: lettuce

serviceAccount:
  # When true (default), the chart creates a ServiceAccount.
  # Set to false to reuse a pre-existing SA — its name must still match `name` below.
  create: true
  name: "otoroshi-admin-user"
  clusterRole: "otoroshi-admin-user"
  clusterRoleBinding: "otoroshi-admin-user"
  # Annotations on the ServiceAccount (e.g., for IRSA / Workload Identity).
  annotations: {}

image:
  name: maif/otoroshi
  tag: 17.16.0-dev
  pullPolicy: IfNotPresent
  https: 8443
  http: 8080

deployment:
  name: otoroshi-deployment
  annotations: {}

service:
  # ClusterIP service that exposes the Otoroshi data plane to in-cluster callers.
  name: otoroshi-service
  # Alias ClusterIP service with the same selector — referenced as ADMIN_API_ADDITIONAL_EXPOSED_DOMAIN
  # so the admin / CRD-controller API has a dedicated DNS name (handy for webhooks, RBAC).
  apiName: otoroshi-api-service
  https: 8443
  http: 8080

loadbalancer:
  # Service type for the external Otoroshi service.
  # Allowed values: LoadBalancer | NodePort | ClusterIP.
  # - LoadBalancer (default): cloud / MetalLB provisions an external IP. Honors `annotations`,
  #   `sourceRanges`, `loadBalancerClass`.
  # - NodePort: exposes ports on every node — honors `nodePort.*` below.
  # - ClusterIP: no external exposure; put your own Ingress / proxy in front.
  # Leave empty to use the default (LoadBalancer, or NodePort if the deprecated `enabled: false` is set).
  type: ""
  name: otoroshi-external-service
  https: 443
  http: 80
  # NodePort values — only used when `type: NodePort`.
  nodePort:
    http: 31080
    https: 31443
  # Annotations applied to the external Service (cloud-provider hints — AWS NLB, GCP Internal LB, etc.).
  annotations: {}
  # LoadBalancer-only: restrict which client CIDRs can reach the LoadBalancer. Empty means open to the world.
  sourceRanges: []
  # LoadBalancer-only: force a specific load balancer class (e.g., service.k8s.aws/nlb).
  # Leave empty for the cluster default.
  loadBalancerClass: ""
  # DEPRECATED. Old boolean flag — kept ONLY for backward compatibility with values files
  # that still set `loadbalancer.enabled: false`. When set, `type` is derived
  # (enabled=true → LoadBalancer, enabled=false → NodePort) UNLESS `type` is also set
  # explicitly (explicit `type` always wins). Migrate to `type`.
  # enabled: ~

env:
  storageRoot: otoroshi
  domain: "oto.tools"
  # When set, password / clientId / clientSecret / otoroshiSecret are read from this Secret
  # (expected keys: password, clientId, clientSecret, otoroshiSecret).
  # When empty, the chart creates its own Secret from the values below.
  existingSecret: ""
  # Each of the four credentials below is used as-is when non-empty. When empty, the chart
  # auto-generates a random value AND uses `lookup` to keep the value stable across upgrades
  # (existing Secret values are preserved). Leave empty for a secure first install.
  password: ""
  clientId: ""
  clientSecret: ""
  secret: ""
  # Redis connection URL. Leave empty to default to the bundled Redis subchart service.
  # Example: redis://redis.example.com:6379/0
  redisURL: ""
  # Redis password (read by Otoroshi as REDIS_PASSWORD). Resolution order:
  # 1. `redisPasswordExistingSecret.name` set → read from that Secret (recommended for external Redis).
  # 2. `redisPassword` non-empty → injected inline.
  # 3. `redis.deploy=true` AND `redis.auth.enabled=true` (default) → read from the bundled subchart Secret.
  # 4. None of the above → no REDIS_PASSWORD env var (assumes a passwordless Redis).
  redisPassword: ""
  redisPasswordExistingSecret:
    name: ""
    # Defaults to `redis-password` if empty.
    key: ""

# Extra env vars appended to the Otoroshi container.
extraEnv: []
# - name: OTOROSHI_FOO
#   value: "bar"

# Extra envFrom sources (configMap or secret references).
extraEnvFrom: []
# - secretRef:
#     name: my-extra-secret

# Extra volumes mounted on the pod (e.g., to inject a config file as described in the docs).
extraVolumes: []
# - name: oto-conf
#   secret:
#     secretName: otoroshi-config

# Extra volumeMounts on the Otoroshi container.
extraVolumeMounts: []
# - name: oto-conf
#   mountPath: /usr/app/otoroshi/conf
#   readOnly: true

# Extra command-line arguments for the container (e.g., -Dconfig.file=/usr/app/otoroshi/conf/oto.conf).
extraArgs: []

# Pod-level annotations (e.g., for Prometheus scraping, Vault injector).
podAnnotations: {}

# Extra labels on pods (do not override app.kubernetes.io/* labels).
podLabels: {}

# Pod scheduling.
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""

# Pod-level security context (uid/gid, fsGroup, runAsNonRoot, …).
podSecurityContext: {}
# Container-level security context.
securityContext: {}

# imagePullSecrets for private registries.
imagePullSecrets: []
# - name: my-registry-creds

# Extra JVM options. The container memory limit caps the heap via MaxRAMPercentage —
# do not set -Xms/-Xmx unless you know what you're doing.
javaOpts: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

resources:
  requests:
    cpu: "2"
    memory: "2Gi"
  limits:
    cpu: "4"
    memory: "4Gi"

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

probes:
  readiness:
    failureThreshold: 1
    initialDelaySeconds: 60
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 2
  liveness:
    failureThreshold: 3
    initialDelaySeconds: 60
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 2

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  # Additional v2 HPA metrics (External / Pods / Object), appended verbatim.
  extraMetrics: []
  # HPA scaling behavior (v2). Empty means use Kubernetes defaults.
  behavior: {}

webhooks:
  validation: true
  sidecarInject: false

# PodDisruptionBudget.
pdb:
  enabled: false
  # Only one of minAvailable / maxUnavailable may be set. Default ensures one pod stays up.
  minAvailable: 1
  maxUnavailable: ""

# NetworkPolicy. When enabled, allows ingress to the Otoroshi pods on the configured ports
# from any namespace, plus egress everywhere. Tighten as needed via networkPolicy.extraIngress / extraEgress.
networkPolicy:
  enabled: false
  # Extra ingress rules appended verbatim.
  extraIngress: []
  # Extra egress rules appended verbatim.
  extraEgress: []

# Cluster (Leader / Worker) mode.
# When enabled, the chart renders two Deployments (leader + worker) and the corresponding
# Services, instead of a single Deployment. Workers connect to the leader API service via mTLS.
# Mirrors kustomize/overlays/cluster/.
cluster:
  enabled: false
  mtls:
    enabled: true
    loose: true
    trustAll: true
  leader:
    name: otoroshi-leader-deployment
    replicas: 2
  worker:
    name: otoroshi-worker-deployment
    replicas: 2
  leaderApiServiceName: otoroshi-leader-api-service
  leaderServiceName: otoroshi-leader-service
  workerServiceName: otoroshi-worker-service
  leaderExternalServiceName: otoroshi-leader-external-service
  workerExternalServiceName: otoroshi-worker-external-service

# Kubernetes Gateway API support.
# Requires Gateway API CRDs (https://github.com/kubernetes-sigs/gateway-api/releases) installed on the cluster.
gatewayApi:
  enabled: false
  controllerName: "otoroshi.io/gateway-controller"
  httpListenerPort: 8080
  httpsListenerPort: 8443
  syncIntervalSeconds: 30

# This block overrides values for the bitnami/redis chart dependency.
# Set redis.deploy=false to skip deploying the bundled Redis and bring your own
# (set env.redisURL accordingly).
# For the full set of configurable options, see:
# https://github.com/bitnami/charts/blob/main/bitnami/redis/values.yaml
redis:
  # When true (default), the bundled bitnami/redis subchart is deployed.
  deploy: true
  cluster:
    enabled: false
  sentinel:
    enabled: false
  # SECURE BY DEFAULT: bitnami auto-generates a password on first install and persists
  # it across `helm upgrade` via lookup. Otoroshi reads it via REDIS_PASSWORD env var
  # (wired automatically by the chart).
  #
  # To use a pre-existing Redis password Secret, set:
  #   redis.auth.existingSecret: my-redis-secret
  #   redis.auth.existingSecretPasswordKey: redis-password
  #
  # To run Redis without auth (NOT RECOMMENDED — anyone in the cluster who can reach
  # `redis-master:6379` can read/write Otoroshi's data plane state):
  #   redis.auth.enabled: false
  auth:
    enabled: true
  master:
    persistence:
      enabled: true
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 8Gi
      existingClaim: ""
  replica:
    persistence:
      enabled: true
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 8Gi
      existingClaim: ""

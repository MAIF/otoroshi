apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: otoroshi-hpa
  labels:
    app.kubernetes.io/name: otoroshi
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: otoroshi-deployment
    # In cluster mode, change to `otoroshi-worker-deployment` (and consider a
    # second HPA for `otoroshi-leader-deployment` if you want both autoscaled).
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  # Conservative scale-down behavior — stay scaled out for a while after a
  # spike so we don't flap.
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

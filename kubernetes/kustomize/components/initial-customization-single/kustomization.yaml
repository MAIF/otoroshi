apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Bootstrap JSON for single-mode Otoroshi (KubernetesConfig.otoroshiServiceName
# = otoroshi-service). Shared by overlays/{simple, simple-baremetal,
# simple-baremetal-daemonset}. Use the `initial-customization-cluster` sibling
# component for Leader+Worker setups.
configMapGenerator:
  - name: otoroshi-initial-customization
    files:
      - initial-customization.json

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# PodDisruptionBudget for single-mode Otoroshi (the `run: otoroshi-deployment`
# selector matches the workload shipped by `components/single-deployment` and
# by the simple-baremetal-daemonset DaemonSet).
#
# Use `components/pdb-cluster` for Leader+Worker setups.
resources:
  - pdb.yaml

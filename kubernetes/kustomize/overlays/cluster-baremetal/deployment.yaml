---
# Patch the leader + worker internal Services from the cluster-deployments
# component to expose them as NodePort. The Deployments themselves come from
# `components/cluster-deployments` unchanged.
apiVersion: v1
kind: Service
metadata:
  name: otoroshi-leader-service
spec:
  type: NodePort
  selector:
    run: otoroshi-leader-deployment
  ports:
  - port: 8080
    name: "http"
    targetPort: "http"
    nodePort: 31080
  - port: 8443
    name: "https"
    targetPort: "https"
    nodePort: 31443
---
apiVersion: v1
kind: Service
metadata:
  name: otoroshi-worker-service
spec:
  type: NodePort
  selector:
    run: otoroshi-worker-deployment
  ports:
  - port: 8080
    name: "http"
    targetPort: "http"
    nodePort: 32080
  - port: 8443
    name: "https"
    targetPort: "https"
    nodePort: 32443

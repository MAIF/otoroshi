apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: otoroshi

resources:
  - ../../base
  - deployment.yaml

# Opt-in components — uncomment any of them you need.
# Available: ../../components/{webhooks,redis,hpa,coredns,gateway-api}
# components:
#   - ../../components/webhooks
#   - ../../components/redis

secretGenerator:
  - name: otoroshi-admin-secret
    literals:
      - password=password
      - clientId=admin-api-apikey-id
      - clientSecret=admin-api-apikey-secret
      - otoroshiSecret=verysecretvaluethatyoumustoverwrite
  - name: otoroshi-redis-secret
    literals:
      - redisUrl=redis://redis-leader-service:6379/0

configMapGenerator:
  - name: otoroshi-config
    literals:
      - domain=oto.tools
  - name: otoroshi-initial-customization
    files:
      - initial-customization.json

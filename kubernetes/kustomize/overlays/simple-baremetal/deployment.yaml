# External-facing Service (NodePort).
# The Deployment + internal Service + Certificate come from
# `components/single-deployment`.
apiVersion: v1
kind: Service
metadata:
  name: otoroshi-external-service
spec:
  type: NodePort
  selector:
    run: otoroshi-deployment
  ports:
  - port: 80
    name: "http"
    targetPort: "http"
    nodePort: 31080
  - port: 443
    name: "https"
    targetPort: "https"
    nodePort: 31443

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: otoroshi

resources:
  # External-facing Service (NodePort) lives in deployment.yaml.
  - ../../base
  - deployment.yaml

components:
  - ../../components/single-deployment
  - ../../components/initial-customization-single
  # Opt-in add-ons — uncomment to enable.
  # - ../../components/webhooks
  # - ../../components/redis
  # - ../../components/hpa
  # - ../../components/coredns
  # - ../../components/gateway-api
  # - ../../components/pdb-single
  # - ../../components/network-policy

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: otoroshi
      app.kubernetes.io/instance: simple-baremetal
      app.kubernetes.io/version: "17.16.0"
      app.kubernetes.io/part-of: otoroshi
      app.kubernetes.io/managed-by: kustomize

images:
  - name: maif/otoroshi
    newTag: 17.16.0-dev-jdk11

replicas:
  - name: otoroshi-deployment
    count: 2

secretGenerator:
  - name: otoroshi-admin-secret
    literals:
      - password=password
      - clientId=admin-api-apikey-id
      - clientSecret=admin-api-apikey-secret
      - otoroshiSecret=verysecretvaluethatyoumustoverwrite
  - name: otoroshi-redis-secret
    literals:
      - redisUrl=redis://redis-leader-service:6379/0

configMapGenerator:
  - name: otoroshi-config
    literals:
      - domain=oto.tools

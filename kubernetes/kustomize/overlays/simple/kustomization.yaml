apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: otoroshi

resources:
  # External-facing Service (LoadBalancer) lives in deployment.yaml.
  - ../../base
  - deployment.yaml

components:
  # Otoroshi Deployment + internal Service + Certificate (single-mode).
  - ../../components/single-deployment
  # Provides the otoroshi-initial-customization ConfigMap (mounted at
  # /etc/otoroshi/initial-customization.json). Shared across the simple*
  # overlays; cluster* overlays use initial-customization-cluster instead.
  - ../../components/initial-customization-single
  # Opt-in add-ons — uncomment to enable.
  # - ../../components/webhooks
  # - ../../components/redis
  # - ../../components/hpa
  # - ../../components/coredns
  # - ../../components/gateway-api

# Recommended Kubernetes labelset applied to every resource (resource labels
# and pod template labels, but NOT to .spec.selector — selectors are immutable
# on existing Deployments). Override `instance` per environment.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: otoroshi
      app.kubernetes.io/instance: simple
      app.kubernetes.io/version: "17.16.0"
      app.kubernetes.io/part-of: otoroshi
      app.kubernetes.io/managed-by: kustomize

# Image — bump with `kustomize edit set image maif/otoroshi=maif/otoroshi:NEW`
images:
  - name: maif/otoroshi
    newTag: 17.16.0-dev-jdk11

# Replicas — bump with `kustomize edit set replicas otoroshi-deployment=N`
replicas:
  - name: otoroshi-deployment
    count: 2

# Admin credentials. Override before deploying to anything other than a
# throwaway cluster. For production, replace this generator with a
# `behavior: replace` one in a personal overlay, or feed values from a real
# secret manager (External Secrets, SOPS, Vault, …).
secretGenerator:
  - name: otoroshi-admin-secret
    literals:
      - password=password
      - clientId=admin-api-apikey-id
      - clientSecret=admin-api-apikey-secret
      - otoroshiSecret=verysecretvaluethatyoumustoverwrite
  # Redis connection. The full URL is in a Secret (not a ConfigMap) because it
  # may contain a password (redis://:password@host:port/db). The default points
  # at the bundled `components/redis` Service; override here when bringing your
  # own Redis. The `components/redis` component overrides this Secret to inject
  # the auto-generated password into the URL.
  - name: otoroshi-redis-secret
    literals:
      - redisUrl=redis://redis-leader-service:6379/0

# Non-secret configuration.
configMapGenerator:
  - name: otoroshi-config
    literals:
      - domain=oto.tools
